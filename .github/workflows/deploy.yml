name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: ai-da-pgsql-databricks # Replace with your GCP Project ID (letters, numbers, hyphens only)
  GAR_LOCATION: us-central1          # Replace with your Artifact Registry region
  GAR_REPO: ag-da-repo               # Replace with your Artifact Registry repository name
  SERVICE: ag-da-service             # Replace with your Cloud Run service name
  REGION: us-central1                # Replace with your Cloud Run region

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # Google Cloud Authentication
      # -------------------------------------------------------------
      # METHOD 1: Workload Identity Federation (Recommended & Secure)
      # To use: Set up WIF on Google Cloud, then uncomment the block below
      # and define WIP_PROVIDER and WIP_SERVICE_ACCOUNT in GitHub Secrets.
      #
      # - name: Google Auth (Workload Identity Federation)
      #   id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.WIP_PROVIDER }}
      #     service_account: ${{ secrets.WIP_SERVICE_ACCOUNT }}

      # METHOD 2: Service Account Key (Simple setup)
      # To use: Create a Service Account, assign Artifact Registry Writer and
      # Cloud Run Developer roles, export the JSON key, and add to GitHub Secrets as GCP_SA_KEY.
      - name: Google Auth (Service Account Key)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Authenticate Docker to Google Artifact Registry
      - name: Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Set up Docker Buildx (for builder caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push the Docker image
      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy the image to Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          # Environment variables for Cloud Run
          # Secure variables (like DATABASE_URL) should be linked to GCP Secret Manager
          # env_vars: |
          #   NODE_ENV=production
          # secrets: |
          #   DATABASE_URL=DATABASE_URL_SECRET:latest

      # Show the Cloud Run service URL
      - name: Show Service URL
        run: |
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
